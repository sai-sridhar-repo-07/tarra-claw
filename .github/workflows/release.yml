name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: Go/go.sum

      - name: Build binaries
        run: |
          TAG=${GITHUB_REF_NAME}
          GODIR=$GITHUB_WORKSPACE/Go
          DIST=$GITHUB_WORKSPACE/dist
          mkdir -p $DIST

          cd $GODIR

          echo "Building darwin/arm64..."
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o $DIST/forge_${TAG}_darwin_arm64  ./cmd/forge

          echo "Building darwin/amd64..."
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o $DIST/forge_${TAG}_darwin_amd64  ./cmd/forge

          echo "Building linux/amd64..."
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o $DIST/forge_${TAG}_linux_amd64   ./cmd/forge

          echo "Building linux/arm64..."
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o $DIST/forge_${TAG}_linux_arm64   ./cmd/forge

          echo "Building windows/amd64..."
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o $DIST/forge_${TAG}_windows_amd64.exe ./cmd/forge

          echo "Creating archives..."
          cd $DIST
          tar czf forge_${TAG}_darwin_arm64.tar.gz  forge_${TAG}_darwin_arm64
          tar czf forge_${TAG}_darwin_amd64.tar.gz  forge_${TAG}_darwin_amd64
          tar czf forge_${TAG}_linux_amd64.tar.gz   forge_${TAG}_linux_amd64
          tar czf forge_${TAG}_linux_arm64.tar.gz   forge_${TAG}_linux_arm64
          zip     forge_${TAG}_windows_amd64.zip     forge_${TAG}_windows_amd64.exe
          sha256sum *.tar.gz *.zip > forge_${TAG}_checksums.txt

          echo "Done:"
          ls -lh $DIST

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Forge ${{ github.ref_name }}"
          body: |
            ## Forge ${{ github.ref_name }}

            AI coding agent — catch bugs before you commit. Works with Anthropic Claude or free with Ollama.

            ### Install

            | Platform | File |
            |---|---|
            | Mac Apple Silicon (M1/M2/M3) | `forge_${{ github.ref_name }}_darwin_arm64.tar.gz` |
            | Mac Intel | `forge_${{ github.ref_name }}_darwin_amd64.tar.gz` |
            | Linux x64 | `forge_${{ github.ref_name }}_linux_amd64.tar.gz` |
            | Linux ARM | `forge_${{ github.ref_name }}_linux_arm64.tar.gz` |
            | Windows | `forge_${{ github.ref_name }}_windows_amd64.zip` |

            ### Quick install (Mac Apple Silicon)
            ```bash
            curl -L https://github.com/sai-sridhar-repo-07/tarra-claw/releases/latest/download/forge_${{ github.ref_name }}_darwin_arm64.tar.gz \
              | tar xz && sudo mv forge_${{ github.ref_name }}_darwin_arm64 /usr/local/bin/forge
            ```

            ### Usage
            ```bash
            forge review --staged   # AI reviews your git diff for bugs
            forge commit            # AI writes your commit message
            forge                   # full interactive AI coding agent
            ```
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*_checksums.txt
