name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: Go/go.sum

      - name: Build
        working-directory: Go
        run: go build ./...

      - name: Vet
        working-directory: Go
        run: go vet ./...
