version: 2

project_name: claw

before:
  hooks:
    - sh -c "cd Go && go mod tidy"

builds:
  - main: ./cmd/claw
    dir: Go
    binary: claw
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    name_template: "claw_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "claw_{{ .Version }}_checksums.txt"

release:
  github:
    owner: sai-sridhar-repo-07
    name: tarra-claw
  name_template: "v{{.Version}}"
  header: |
    ## Tarra Claw v{{.Version}}

    AI agent CLI — works with **Ollama (free, no API key)** or Anthropic Claude.

    ### Install

    Download the binary for your platform below, then:

    ```bash
    # Mac example
    tar -xzf claw_{{.Version}}_darwin_arm64.tar.gz
    sudo mv claw /usr/local/bin/

    # Free local AI (no API key)
    brew install ollama && ollama serve &
    ollama pull llama3.2
    claw
    ```

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch
