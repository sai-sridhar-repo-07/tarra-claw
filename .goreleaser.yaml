version: 2

project_name: claw

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/claw
    dir: Go
    binary: claw
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "claw_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "claw_{{ .Version }}_checksums.txt"

release:
  github:
    owner: sai-sridhar-repo-07
    name: tarra-claw
  name_template: "v{{.Version}}"
  header: |
    ## Tarra Claw v{{.Version}}

    AI agent CLI — works with **Ollama (free, no API key)** or Anthropic Claude.

    ### Quick install

    **Mac (Homebrew)**
    ```bash
    brew install ollama
    ollama serve & ollama pull llama3.2
    ```
    Then download the binary below for your platform.

    **Go install**
    ```bash
    go install github.com/sai-sridhar-repo-07/tarra-claw/Go/cmd/claw@latest
    ```

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

brews:
  - name: claw
    homepage: https://github.com/sai-sridhar-repo-07/tarra-claw
    description: "AI agent CLI — Ollama (free) or Anthropic. Written in Go."
    license: MIT
    repository:
      owner: sai-sridhar-repo-07
      name: homebrew-claw
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    install: |
      bin.install "claw"
    test: |
      system "#{bin}/claw", "--version"
